# TG11 mainnet private RPC node
# Use for backend services, explorers, or wallet services.
# This profile should not be exposed directly to the public internet.

chain=main
listen=0
server=1
daemon=1
txindex=0

# Keep P2P outbound only unless you intentionally open inbound.
connect=0
dnsseed=1

# RPC: bind to private network only.
# Example:
# rpcbind=10.10.0.10:31110
# rpcallowip=10.10.0.0/16
rpcbind=127.0.0.1:31110
rpcallowip=127.0.0.1

# REQUIRED: set strong RPC credentials.
# rpcuser=REPLACE_ME
# rpcpassword=REPLACE_ME

# Optional operational settings
dbcache=256
maxmempool=200
prune=550
fallbackfee=0.0001

# NOTE: If this node will power an explorer/indexer, migrate to a larger VM and use:
# txindex=1
# prune=0
