# TG11 mainnet full node
# Use on general public relay nodes.

chain=main
listen=1
server=1
daemon=1
txindex=0

# P2P
port=31111
maxconnections=200
discover=1
upnp=0
natpmp=0
dnsseed=1

# Optional peers to speed bootstrap.
# addnode=seed1.tg11.org:31111
# addnode=seed2.tg11.org:31111
# addnode=seed3.tg11.org:31111

# RPC defaults to localhost only.
rpcbind=127.0.0.1:31110
rpcallowip=127.0.0.1
# rpcuser=REPLACE_ME
# rpcpassword=REPLACE_ME

# Storage/operational tuning
dbcache=192
maxmempool=150
prune=550
fallbackfee=0.0001

# NOTE: For archival or explorer workloads, use a larger VM and switch to:
# txindex=1
# prune=0
