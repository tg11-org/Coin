# Apache2 vhosts for faucet + status server (198.74.54.235)
# Save as: /etc/apache2/sites-available/testnet-faucet-status.conf
# Enable with: a2ensite testnet-faucet-status.conf && systemctl reload apache2
#
# Certbot command (after DNS is live and set to DNS-only in Cloudflare):
# certbot --apache --non-interactive --agree-tos --redirect -m admin@tg11.org \
#   -d faucet.testnet.tg11.org -d status.testnet.tg11.org

<VirtualHost *:80>
    ServerName faucet.testnet.tg11.org
    ServerAlias faucet.testnet.tg11.org

    ErrorLog ${APACHE_LOG_DIR}/faucet-error.log
    CustomLog ${APACHE_LOG_DIR}/faucet-access.log combined

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/
</VirtualHost>

<VirtualHost *:80>
    ServerName status.testnet.tg11.org
    ServerAlias status.testnet.tg11.org

    ErrorLog ${APACHE_LOG_DIR}/status-error.log
    CustomLog ${APACHE_LOG_DIR}/status-access.log combined

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName faucet.testnet.tg11.org
    ServerAlias faucet.testnet.tg11.org

    ErrorLog ${APACHE_LOG_DIR}/faucet-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/faucet-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/faucet.testnet.tg11.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/faucet.testnet.tg11.org/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    Header always set Strict-Transport-Security "max-age=31536000"
</VirtualHost>

<VirtualHost *:443>
    ServerName status.testnet.tg11.org
    ServerAlias status.testnet.tg11.org

    ErrorLog ${APACHE_LOG_DIR}/status-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/status-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/status.testnet.tg11.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/status.testnet.tg11.org/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    Header always set Strict-Transport-Security "max-age=31536000"
</VirtualHost>
</IfModule>
