# TG11 mainnet seed/full-relay node
# Use on public-facing nodes that should accept inbound peers.

# Network
chain=main
listen=1
server=1
daemon=1
txindex=0
prune=550

# P2P
port=31111
maxconnections=64
discover=1
upnp=0
natpmp=0

# For stable seed nodes, set explicit external IP/DNS.
# externalip=seed1.tg11.org

# Keep DNS seeding enabled so new peers discover the network.
dnsseed=1

# Add known bootstrap peers (replace with real hosts once online).
# addnode=seed1.tg11.org:31111
# addnode=seed2.tg11.org:31111
# addnode=seed3.tg11.org:31111

# RPC intentionally restricted.
rpcbind=127.0.0.1:31110
rpcallowip=127.0.0.1

# Logging and safety
printtoconsole=0
debug=0
dbcache=128
maxmempool=100
fallbackfee=0.0001
