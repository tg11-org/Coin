# Apache2 vhosts for explorer/full1 server (74.207.233.139)
# Save as: /etc/apache2/sites-available/testnet-explorer-full1.conf
# Enable with: a2ensite testnet-explorer-full1.conf && systemctl reload apache2
#
# Certbot command (after DNS is live and set to DNS-only in Cloudflare):
# certbot --apache --non-interactive --agree-tos --redirect -m admin@tg11.org \
#   -d explorer.testnet.tg11.org -d full1.testnet.tg11.org

<VirtualHost *:80>
    ServerName explorer.testnet.tg11.org
    ServerAlias explorer.testnet.tg11.org

    ErrorLog ${APACHE_LOG_DIR}/explorer-error.log
    CustomLog ${APACHE_LOG_DIR}/explorer-access.log combined

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>

<VirtualHost *:80>
    ServerName full1.testnet.tg11.org
    ServerAlias full1.testnet.tg11.org

    DocumentRoot /var/www/full1-status

    ErrorLog ${APACHE_LOG_DIR}/full1-error.log
    CustomLog ${APACHE_LOG_DIR}/full1-access.log combined

    <Directory /var/www/full1-status>
        Require all granted
        Options FollowSymLinks
        AllowOverride None
    </Directory>
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName explorer.testnet.tg11.org
    ServerAlias explorer.testnet.tg11.org

    ErrorLog ${APACHE_LOG_DIR}/explorer-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/explorer-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/explorer.testnet.tg11.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/explorer.testnet.tg11.org/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    Header always set Strict-Transport-Security "max-age=31536000"
</VirtualHost>

<VirtualHost *:443>
    ServerName full1.testnet.tg11.org
    ServerAlias full1.testnet.tg11.org

    DocumentRoot /var/www/full1-status

    ErrorLog ${APACHE_LOG_DIR}/full1-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/full1-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/full1.testnet.tg11.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/full1.testnet.tg11.org/privkey.pem

    <Directory /var/www/full1-status>
        Require all granted
        Options FollowSymLinks
        AllowOverride None
    </Directory>

    Header always set Strict-Transport-Security "max-age=31536000"
</VirtualHost>
</IfModule>
